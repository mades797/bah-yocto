# Force default application loops to use our strict output bridge
pcm.!default {
    type asym
    playback.pcm "vlc_safe_bridge"
}

# Rigid software pipeline that locks audio streaming bounds
pcm.vlc_safe_bridge {
    type plug
    slave {
        pcm "hw:Zero"
        format S16_LE
        rate 44100
        channels 2
    }
}

# Mask the control layer to keep external apps from accessing raw mixer controls
ctl.!default {
    type plug
    slave.pcm "vlc_safe_bridge"
}

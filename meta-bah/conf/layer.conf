# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-bah"
BBFILE_PATTERN_meta-bah = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-bah = "6"
LAYERDEPENDS_meta-bah = "core"
LAYERSERIES_COMPAT_meta-bah = "scarthgap"
